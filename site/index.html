<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>my.msfs-flightlog24 · MSFS Flight Logbook</title>
  <link rel="stylesheet" href="assets/style.css?v=3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>✈️</text></svg>">
</head>
<body>
  <header class="site-header">
    <span class="brand">my.msfs-flightlog<span class="dot">24</span></span>
    <span class="tagline">Microsoft Flight Simulator · personal flight logbook</span>
  </header>

  <div id="globe"><div class="globe-hint">拖曳旋轉 · 滾輪縮放 · 點擊航線看詳情</div></div>

  <section class="stats" id="stats"></section>

  <div class="wrap">
    <div class="list-head">
      <h2>Flights</h2>
      <div class="filters">
        <input id="search" type="search" placeholder="搜尋機型 / 機場…">
        <select id="filter-ac"><option value="">所有機型</option></select>
        <select id="sort">
          <option value="date">最新優先</option>
          <option value="dist">距離最長</option>
        </select>
      </div>
    </div>
    <div id="list"></div>
  </div>

  <footer class="site-footer">
    Recorded with <a href="https://flightsim.to/addon/8163/flight-recorder">Flight Recorder</a> ·
    rebuilt automatically on every push
  </footer>

  <script src="https://unpkg.com/globe.gl@2.34.4/dist/globe.gl.min.js"></script>
  <script src="assets/app.js?v=4"></script>
</body>
</html>
