<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>my.msfs-flightlog24 · MSFS Flight Logbook</title>
  <meta name="theme-color" content="#05070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlightLog24">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="assets/icon-192.png">
  <link rel="stylesheet" href="assets/style.css?v=12">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div id="splash">
    <div class="orbit">
      <div class="path"></div>
      <div class="hub"></div>
      <div class="runner"><svg viewBox="-12 -12 24 24"><path fill="#eef6ff" stroke="#0b2030" stroke-width=".8"
        d="M0,-11 L2,-3 L11,3 L11,5 L2,1 L2,7 L5,9.5 L5,10.5 L0,9 L-5,10.5 L-5,9.5 L-2,7 L-2,1 L-11,5 L-11,3 L-2,-3 Z"/></svg></div>
    </div>
    <div class="splash-brand">my.msfs-flightlog<span>24</span></div>
    <div class="splash-sub" data-i18n="splash_home">載入飛行紀錄</div>
  </div>

  <header class="site-header">
    <span class="brand">my.msfs-flightlog<span class="dot">24</span></span>
    <span class="tagline" data-i18n="tagline">Microsoft Flight Simulator · personal flight logbook</span>
  </header>

  <div id="stage">
    <div id="globe"></div>
    <div class="globe-hint" data-i18n="globe_hint">拖曳旋轉 · 滾輪縮放 · 點擊航線看詳情 · 放大切換衛星圖</div>
    <div id="flatmap"></div>
    <button id="to-globe" class="to-globe" hidden data-icon="back"><span data-i18n="back_to_globe">回到地球</span></button>
  </div>

  <section class="stats" id="stats"></section>

  <div class="wrap analytics-wrap">
    <button class="analytics-toggle" id="analytics-toggle" aria-expanded="false">
      <span class="atitle" data-icon="chart"><span data-i18n="analytics_title">飛行分析</span></span>
      <span class="chev" data-icon="chevron"></span>
    </button>
    <div class="analytics" id="analytics"><div class="analytics-inner" id="analytics-inner"></div></div>
  </div>

  <div class="wrap">
    <div class="list-head">
      <h2 data-i18n="list_heading">Flights</h2>
      <div class="filters">
        <input id="search" type="search" data-i18n-ph="search_ph" placeholder="搜尋機型 / 機場…">
        <select id="filter-ac"><option value="" data-i18n="all_aircraft">所有機型</option></select>
        <select id="sort">
          <option value="date" data-i18n="sort_date">最新優先</option>
          <option value="dist" data-i18n="sort_dist">距離最長</option>
        </select>
      </div>
    </div>
    <div id="list"></div>
  </div>

  <footer class="site-footer">
    <span data-i18n="footer_pre">Recorded with</span>
    <a href="https://flightsim.to/addon/8163/flight-recorder">Flight Recorder</a>
    <span data-i18n="footer_post">· rebuilt automatically on every push</span>
  </footer>

  <script src="https://unpkg.com/globe.gl@2.34.4/dist/globe.gl.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="assets/i18n.js?v=1"></script>
  <script src="assets/app.js?v=11"></script>
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}</script>
</body>
</html>
